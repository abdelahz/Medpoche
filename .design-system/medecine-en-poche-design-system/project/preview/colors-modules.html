<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:20px;}
  .row{display:flex;gap:14px;}
  .mod{flex:1;display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .chip{width:100%;height:54px;border-radius:var(--radius-md);}
  .badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:var(--radius-full);}
  .name{font-size:11px;font-weight:600;color:var(--gray-900);}
  .hex{font-size:10px;color:var(--gray-600);font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="mod"><div class="chip" style="background:var(--module-maths)"></div><span class="badge" style="background:#EEF4FF;color:#3B6BE8">Mathématiques</span><span class="hex">#3B6BE8</span></div>
    <div class="mod"><div class="chip" style="background:var(--module-chimie)"></div><span class="badge" style="background:#E6F6FE;color:#0369A1">Chimie</span><span class="hex">#0EA5E9</span></div>
    <div class="mod"><div class="chip" style="background:var(--module-physique)"></div><span class="badge" style="background:#F3EEFE;color:#6D28D9">Physique</span><span class="hex">#8B5CF6</span></div>
    <div class="mod"><div class="chip" style="background:var(--module-svt)"></div><span class="badge" style="background:#E7F8F1;color:#047857">SVT</span><span class="hex">#10B981</span></div>
  </div>
</body></html>
