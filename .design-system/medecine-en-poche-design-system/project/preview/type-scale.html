<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:22px 24px;color:var(--gray-900);}
  .r{display:flex;align-items:baseline;gap:14px;padding:5px 0;border-bottom:0.5px solid var(--gray-100);}
  .r:last-child{border-bottom:none;}
  .tok{flex:0 0 92px;font-size:10px;font-weight:600;color:var(--gray-600);font-variant-numeric:tabular-nums;}
  .px{flex:0 0 38px;font-size:10px;color:var(--gray-400);font-variant-numeric:tabular-nums;text-align:right;}
  .spec{color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style></head>
<body>
  <div class="r"><span class="tok">stat</span><span class="px">28</span><span class="spec" style="font-size:28px;font-weight:700">128 étudiants</span></div>
  <div class="r"><span class="tok">2xl</span><span class="px">24</span><span class="spec" style="font-size:24px;font-weight:700">Tableau de bord</span></div>
  <div class="r"><span class="tok">xl</span><span class="px">20</span><span class="spec" style="font-size:20px;font-weight:600">Banque de QCMs</span></div>
  <div class="r"><span class="tok">lg</span><span class="px">17</span><span class="spec" style="font-size:17px;font-weight:600">Titre de page</span></div>
  <div class="r"><span class="tok">md</span><span class="px">15</span><span class="spec" style="font-size:15px;font-weight:600">MedenPoche</span></div>
  <div class="r"><span class="tok">sm · UI</span><span class="px">13</span><span class="spec" style="font-size:13px;font-weight:400">Texte courant et libellés de contrôles</span></div>
  <div class="r"><span class="tok">xs</span><span class="px">12</span><span class="spec" style="font-size:12px;font-weight:400;color:var(--gray-600)">Libellé secondaire</span></div>
  <div class="r"><span class="tok">micro</span><span class="px">10</span><span class="spec" style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-600)">Micro-label</span></div>
</body></html>
