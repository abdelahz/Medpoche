<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:24px;display:flex;gap:36px;align-items:center;}
  .block{flex:1;display:flex;flex-direction:column;gap:14px;}
  .lab{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-600);}
  .track{height:6px;border-radius:9999px;background:var(--primary-50);overflow:hidden;}
  .fill{height:100%;border-radius:9999px;background:var(--primary-500);}
  .avatars{display:flex;align-items:flex-end;gap:14px;}
  .av{border-radius:9999px;background:var(--primary-50);color:var(--primary-600);font-weight:600;display:flex;align-items:center;justify-content:center;}
  .a28{width:28px;height:28px;font-size:11px;}
  .a36{width:36px;height:36px;font-size:14px;}
  .a44{width:44px;height:44px;font-size:18px;}
</style></head>
<body>
  <div class="block">
    <span class="lab">Progression</span>
    <div class="track"><div class="fill" style="width:32%"></div></div>
    <div class="track"><div class="fill" style="width:68%"></div></div>
    <div class="track"><div class="fill" style="width:94%"></div></div>
  </div>
  <div class="block" style="flex:0 0 auto">
    <span class="lab">Avatars</span>
    <div class="avatars">
      <div class="av a28">SL</div>
      <div class="av a36">YM</div>
      <div class="av a44">AB</div>
    </div>
  </div>
</body></html>
