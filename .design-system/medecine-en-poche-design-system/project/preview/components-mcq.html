<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:22px 24px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .opt{padding:11px 16px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;transition:all 150ms ease;cursor:pointer;}
  .opt .k{width:20px;height:20px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
  .opt .ic{margin-left:auto;display:flex;}
  .opt .ic svg{width:16px;height:16px;}
  [data-state="default"]{border:0.5px solid var(--gray-200);background:#fff;color:var(--gray-900);}
  [data-state="default"] .k{background:var(--gray-100);color:var(--gray-600);}
  [data-state="selected"]{border:1.5px solid var(--primary-500);background:var(--primary-50);color:var(--primary-900);}
  [data-state="selected"] .k{background:var(--primary-500);color:#fff;}
  [data-state="correct"]{border:1.5px solid var(--success-solid);background:var(--success-bg);color:var(--success-text);}
  [data-state="correct"] .k{background:var(--success-solid);color:#fff;}
  [data-state="wrong"]{border:1.5px solid var(--danger-solid);background:var(--danger-bg);color:var(--danger-text);}
  [data-state="wrong"] .k{background:var(--danger-solid);color:#fff;}
</style></head>
<body>
  <div class="opt" data-state="default"><span class="k">A</span>Le noyau cellulaire</div>
  <div class="opt" data-state="selected"><span class="k">B</span>La mitochondrie</div>
  <div class="opt" data-state="correct"><span class="k">C</span>Le réticulum<span class="ic"><i data-lucide="check"></i></span></div>
  <div class="opt" data-state="wrong"><span class="k">D</span>L'appareil de Golgi<span class="ic"><i data-lucide="x"></i></span></div>
  <script>lucide.createIcons();</script>
</body></html>
