<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:20px 24px;display:flex;gap:28px;}
  .side{flex:0 0 230px;display:flex;flex-direction:column;gap:6px;}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--gray-600);}
  .nav svg{width:20px;height:20px;color:var(--gray-400);}
  .nav.hover{background:var(--gray-50);}
  .nav.active{background:var(--primary-50);color:var(--primary-600);border-left:2px solid var(--primary-500);border-radius:0 8px 8px 0;padding-left:8px;}
  .nav.active svg{color:var(--primary-500);}
  .tag{margin-left:auto;font-size:10px;color:var(--gray-400);}
  .bottom{flex:1;display:flex;flex-direction:column;gap:12px;}
  .bar{display:flex;justify-content:space-around;background:#fff;border:0.5px solid var(--gray-200);border-radius:12px;padding:8px 4px;}
  .bi{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray-400);}
  .bi svg{width:22px;height:22px;}
  .bi span{font-size:10px;font-weight:500;}
  .bi.on{color:var(--primary-500);}
  .bi .pip{width:4px;height:4px;border-radius:9999px;background:var(--primary-500);}
  .lab{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-600);margin-bottom:2px;}
</style></head>
<body>
  <div class="side">
    <span class="lab">Sidebar nav</span>
    <div class="nav active"><i data-lucide="layout-dashboard"></i>Tableau de bord</div>
    <div class="nav hover"><i data-lucide="file-text"></i>QCMs<span class="tag">hover</span></div>
    <div class="nav"><i data-lucide="book-open"></i>Bibliothèque</div>
    <div class="nav"><i data-lucide="database"></i>Dataset IA</div>
  </div>
  <div class="bottom">
    <span class="lab">Student bottom bar</span>
    <div class="bar">
      <div class="bi on"><i data-lucide="home"></i><span>Accueil</span><div class="pip"></div></div>
      <div class="bi"><i data-lucide="zap"></i><span>S'entraîner</span></div>
      <div class="bi"><i data-lucide="book-open"></i><span>Biblio</span></div>
      <div class="bi"><i data-lucide="message-square"></i><span>IA</span></div>
      <div class="bi"><i data-lucide="trending-up"></i><span>Progrès</span></div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
