<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:20px 24px;display:flex;align-items:center;gap:22px;}
  .tile{width:150px;height:130px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .tile img{height:104px;display:block;}
  .light{background:#fff;border:0.5px solid var(--gray-200);}
  .dark{background:#145281;}
  .marks{display:flex;flex-direction:column;gap:16px;border-left:0.5px solid var(--gray-200);padding-left:22px;}
  .row{display:flex;align-items:center;gap:14px;}
  .word{font-size:18px;font-weight:700;color:#145281;letter-spacing:-0.01em;}
  .mono{width:40px;height:40px;border-radius:10px;background:#145281;color:#fff;font-weight:700;font-size:20px;display:flex;align-items:center;justify-content:center;}
  .cap{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);}
</style></head>
<body>
  <div class="tile light"><img src="../assets/medenpoche-logo-transparent.png" alt="Med En Poche"></div>
  <div class="tile dark"><img src="../assets/medenpoche-logo-white.png" alt="Med En Poche"></div>
  <div class="marks">
    <div class="row"><span class="word">Med En Poche</span><span class="cap">wordmark</span></div>
    <div class="row"><span class="mono">M</span><span class="cap">monogram · collapsed nav</span></div>
  </div>
</body></html>
