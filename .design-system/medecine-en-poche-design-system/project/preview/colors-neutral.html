<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:20px;}
  .row{display:flex;gap:10px;}
  .swatch{flex:1;display:flex;flex-direction:column;gap:8px;}
  .chip{height:60px;border-radius:var(--radius-md);border:0.5px solid var(--gray-200);}
  .meta{display:flex;flex-direction:column;gap:1px;}
  .name{font-size:11px;font-weight:600;color:var(--gray-900);}
  .hex{font-size:10px;color:var(--gray-600);font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:var(--gray-0)"></div><div class="meta"><span class="name">gray-0</span><span class="hex">#FFFFFF</span></div></div>
    <div class="swatch"><div class="chip" style="background:var(--gray-50)"></div><div class="meta"><span class="name">gray-50</span><span class="hex">#F7F8FC</span></div></div>
    <div class="swatch"><div class="chip" style="background:var(--gray-100)"></div><div class="meta"><span class="name">gray-100</span><span class="hex">#F0F2F7</span></div></div>
    <div class="swatch"><div class="chip" style="background:var(--gray-200)"></div><div class="meta"><span class="name">gray-200</span><span class="hex">#EAECF0</span></div></div>
    <div class="swatch"><div class="chip" style="background:var(--gray-400)"></div><div class="meta"><span class="name">gray-400</span><span class="hex">#C0C6D4</span></div></div>
    <div class="swatch"><div class="chip" style="background:var(--gray-600)"></div><div class="meta"><span class="name">gray-600</span><span class="hex">#8A92A6</span></div></div>
    <div class="swatch"><div class="chip" style="background:var(--gray-900)"></div><div class="meta"><span class="name">gray-900</span><span class="hex">#1A1D2E</span></div></div>
  </div>
</body></html>
