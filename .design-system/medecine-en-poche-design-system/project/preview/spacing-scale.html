<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:22px 24px;}
  .row{display:flex;align-items:flex-end;gap:18px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--primary-500);border-radius:2px;width:100%;}
  .wrap{display:flex;align-items:flex-end;height:48px;}
  .tok{font-size:11px;font-weight:600;color:var(--gray-900);}
  .px{font-size:10px;color:var(--gray-600);font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="wrap"><div class="bar" style="height:4px;width:4px"></div></div><span class="tok">xs</span><span class="px">4px</span></div>
    <div class="item"><div class="wrap"><div class="bar" style="height:8px;width:8px"></div></div><span class="tok">sm</span><span class="px">8px</span></div>
    <div class="item"><div class="wrap"><div class="bar" style="height:12px;width:12px"></div></div><span class="tok">md</span><span class="px">12px</span></div>
    <div class="item"><div class="wrap"><div class="bar" style="height:16px;width:16px"></div></div><span class="tok">lg</span><span class="px">16px</span></div>
    <div class="item"><div class="wrap"><div class="bar" style="height:24px;width:24px"></div></div><span class="tok">xl</span><span class="px">24px</span></div>
    <div class="item"><div class="wrap"><div class="bar" style="height:32px;width:32px"></div></div><span class="tok">2xl</span><span class="px">32px</span></div>
    <div class="item"><div class="wrap"><div class="bar" style="height:48px;width:48px"></div></div><span class="tok">3xl</span><span class="px">48px</span></div>
  </div>
</body></html>
