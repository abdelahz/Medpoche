<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:22px 24px;color:var(--gray-900);}
  .r{display:flex;align-items:baseline;gap:16px;padding:7px 0;}
  .tok{flex:0 0 130px;font-size:11px;color:var(--gray-600);}

  .spec{font-size:22px;color:var(--gray-900);}

<body>
  <div class="r"><span class="tok"><b>400</b> Regular</span><span class="spec" style="font-weight:400">Concours de médecine</span></div>
  <div class="r"><span class="tok"><b>500</b> Medium</span><span class="spec" style="font-weight:500">Concours de médecine</span></div>
  <div class="r"><span class="tok"><b>600</b> SemiBold</span><span class="spec" style="font-weight:600">Concours de médecine</span></div>
  <div class="r"><span class="tok"><b>700</b> Bold</span><span class="spec" style="font-weight:700">Concours de médecine</span></div>
</body></html>
