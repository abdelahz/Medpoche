<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--gray-0);padding:20px;display:flex;gap:16px;align-items:center;}
  .pair{display:flex;gap:14px;flex:1;}
  .swatch{flex:1;display:flex;flex-direction:column;gap:8px;}
  .chip{height:72px;border-radius:var(--radius-md);}
  .name{font-size:12px;font-weight:600;color:var(--gray-900);}
  .hex{font-size:11px;color:var(--gray-600);font-variant-numeric:tabular-nums;}
  .use{font-size:10px;color:var(--gray-400);}
  .note{flex:0 0 200px;font-size:11px;color:var(--gray-600);line-height:1.5;}
</style></head>
<body>
  <div class="pair">
    <div class="swatch"><div class="chip" style="background:var(--brand-green)"></div><span class="name">brand-green</span><span class="hex">#6FAC35</span><span class="use">“concours” text</span></div>
    <div class="swatch"><div class="chip" style="background:var(--brand-blue)"></div><span class="name">brand-blue</span><span class="hex">#145281</span><span class="use">cap / wordmark</span></div>
  </div>
  <p class="note">Drawn from the logo (cap + pocket mark). <strong>Accent use only</strong> — the interactive system runs on <code>primary-500&nbsp;#3B6BE8</code>, not these.</p>
</body></html>
